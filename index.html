<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>康康背词器</title>
    <meta name="theme-color" content="#f5f5f7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="康康背词器">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon-180.png">
    <style>
        /* General Styling */
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            margin: 0;
            padding: 1rem;
        }
        main {
            text-align: center;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }

        .hidden { display: none !important; }
        #app-title {
            font-size: 2.8rem;
            font-weight: 300;
            color: #555;
            letter-spacing: 4px;
            margin: 1rem 0 2rem 0;
        }

        /* Local PWA Status Section */
        #auth-container {
            padding: 2rem;
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            margin-bottom: 2rem;
            text-align: center;
        }
        #auth-container h3 {
            font-weight: 500;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
        }
        #auth-container input {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 1rem;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 1rem;
        }
        #auth-container button {
            width: 100%;
            border: none;
            color: white;
            padding: 0.8rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: background-color 0.2s;
        }
        #login-btn, #register-btn {
            background-color: #007bff;
        }
        #login-btn:hover, #register-btn:hover {
            background-color: #0056b3;
        }
        #logout-btn {
            background-color: #dc3545;
            max-width: 200px; /* Smaller logout button */
        }
        #logout-btn:hover { background-color: #c82333; }

        #auth-container p {
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }
        #auth-container a {
            color: #007bff;
            text-decoration: none;
            cursor: pointer;
        }
        #auth-container a:hover {
            text-decoration: underline;
        }
        #user-info {
            font-size: 0.9rem;
            color: #6c757d;
            margin-bottom: 1rem;
        }
        .auth-error-message {
            color: #dc3545;
            margin-top: -0.5rem;
            margin-bottom: 1rem;
            min-height: 1.2em;
            text-align: left;
            font-size: 0.85rem;
        }


        /* Add Word Container */
        #add-word-container {
            display: flex;
            gap: 10px;
            margin-bottom: 1.5rem;
            background-color: #fff;
            padding: 1rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        #add-word-input {
            flex-grow: 1;
            border: 1px solid #ccc;
            padding: 0.75rem;
            border-radius: 8px;
            font-size: 1rem;
        }
        #add-word-btn {
            border: none;
            background-color: #17a2b8;
            color: white;
            padding: 0 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: background-color 0.2s;
        }
        #add-word-btn:hover { background-color: #138496; }

        /* Mode Switcher */
        .mode-switcher {
            margin-bottom: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }
        .mode-button {
            background: #fff;
            border: 1px solid #ccc;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            margin: 0;
        }
        .mode-button.active {
            background: #007bff;
            color: white;
            border-color: #007bff;
        }
        .home-choice-view {
            min-height: 56vh;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 1rem;
            align-items: stretch;
        }
        .home-choice-button {
            min-height: 220px;
            border: none;
            border-radius: 12px;
            background: #fff;
            color: #1f2933;
            box-shadow: 0 10px 28px rgba(0,0,0,0.08);
            cursor: pointer;
            font-size: 2.2rem;
            font-weight: 650;
            transition: transform 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease;
        }
        .home-choice-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 36px rgba(0,0,0,0.12);
        }
        .home-choice-button.primary {
            background: #007bff;
            color: #fff;
        }
        .home-choice-button.secondary {
            background: #17a2b8;
            color: #fff;
        }
        .section-back-btn {
            border: none;
            background: transparent;
            color: #6c757d;
            cursor: pointer;
            padding: 0.35rem 0.2rem;
            margin-bottom: 0.75rem;
            font-size: 0.95rem;
        }
        .section-back-btn:hover {
            color: #007bff;
        }

        /* Word Card */
        .word-card {
            background-color: #ffffff;
            padding: 2.5rem 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .word-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        #main-word {
            font-size: 3.5rem;
            font-weight: bold;
            margin: 0;
        }
        #word-details { transition: opacity 0.5s ease; }
        #pronunciation, #definition { margin: 0.5rem 0; }
        .speak-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            line-height: 1;
            border-radius: 50%;
            transition: background-color 0.2s;
        }
        .speak-btn:hover { background-color: #f0f0f0; }
        .speak-btn svg { width: 28px; height: 28px; fill: #555; }

        /* Sentence Makers & Feedback */
        #sentence-maker, #challenge-sentence-maker, #translation-challenge-maker { margin-top: 1.5rem; }
        #sentence-input, #challenge-sentence-input, #translation-challenge-input {
            width: 100%;
            min-height: 100px;
            padding: 0.5rem;
            font-size: 1rem;
            border-radius: 8px;
            border: 1px solid #ccc;
        }
        #ai-feedback, #challenge-ai-feedback, #translation-ai-feedback {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 8px;
            background-color: #e9ecef;
            text-align: left;
        }

        /* Loading Spinners */
        #loading-spinner, #challenge-loading-spinner, #translation-loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #007bff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Action Buttons */
        .actions {
            margin-top: 2rem;
            display: flex;
            justify-content: space-around;
        }
        .action-button {
            width: 45%;
            border: none;
            padding: 1rem;
            border-radius: 50px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        #btn-unknown { background-color: #ffc107; }
        #btn-known, #btn-confirm-known { background-color: #28a745; color: white; }
        #btn-correction, #btn-submit-sentence, #btn-finish-learning, #btn-start-challenge, #btn-submit-challenge, #btn-next-challenge, #btn-start-translation-challenge, #btn-submit-translation, #btn-next-translation-challenge, #btn-restart-wordlist, #btn-continue-review {
            background-color: #007bff;
            color: white;
        }

        /* Challenge Views */
        #challenge-setup, #translation-challenge-setup { padding: 2rem; }
        #challenge-words-display {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-bottom: 1.5rem;
        }
        .challenge-word-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #fff;
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid #ddd;
        }
        .challenge-word-item label { font-size: 1rem; cursor: pointer; }
        .challenge-word-item input[type="checkbox"] {
            margin-right: 5px;
            cursor: pointer;
        }
        .checkbox-label {
            font-size: 0.8rem;
            color: #666;
            cursor: pointer;
        }


        #translation-chinese-sentence {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 2rem;
            padding: 1rem;
            border-left: 4px solid #28a745;
            background-color: #f8f9fa;
        }

        /* List Views */
        .list-view { padding: 1rem; }
        .word-list-container { margin-bottom: 2rem; }
        .word-list-container h3 {
            color: #007bff;
            border-bottom: 2px solid #007bff;
            padding-bottom: 0.5rem;
        }
        .word-list { list-style-type: none; padding: 0; }
        .word-list li {
            background-color: #fff;
            padding: 0.75rem 1rem;
            margin-bottom: 0.5rem;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .delete-word-btn {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 0.3rem 0.6rem;
            border-radius: 5px;
            cursor: pointer;
        }

        /* Errata Styles */
        #errata-view { text-align: left; }
        .errata-subnav {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 1rem;
        }
        .errata-tab-btn {
            border: 1px solid #ced4da;
            background: #fff;
            border-radius: 8px;
            padding: 0.65rem 1rem;
            cursor: pointer;
            color: #343a40;
        }
        .errata-tab-btn.active {
            background: #007bff;
            border-color: #007bff;
            color: #fff;
        }
        .errata-group {
            background: #fff;
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        .errata-group-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            padding-bottom: 1rem;
            margin-bottom: 1rem;
        }
        .errata-group-header h3 { margin: 0; color: #007bff; }
        .delete-group-btn {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
        }
        .add-word-to-group-form {
            display: flex;
            gap: 10px;
            margin-bottom: 1rem;
        }
        .add-word-to-group-input {
            flex-grow: 1;
            border: 1px solid #ccc;
            padding: 0.5rem;
            border-radius: 8px;
        }
        .add-word-to-group-btn {
            border: none;
            background-color: #28a745;
            color: white;
            padding: 0 1.5rem;
            border-radius: 8px;
            cursor: pointer;
        }
        .errata-word-list { list-style-type: none; padding: 0; }
        .errata-word-list li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem;
            border-bottom: 1px solid #f0f0f0;
        }
        /* Reader */
        #reader-view {
            text-align: left;
            width: min(860px, calc(100vw - 2rem));
            margin-left: 50%;
            transform: translateX(-50%);
        }
        .reader-shell {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .reader-toolbar {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 0.75rem;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid #e9ecef;
            background: #f8f9fa;
        }
        .reader-toolbar select,
        .reader-toolbar input[type="file"] {
            width: 100%;
            min-height: 42px;
            padding: 0.65rem;
            border: 1px solid #ced4da;
            border-radius: 8px;
            background: #fff;
            font-size: 0.95rem;
        }
        .reader-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        #reader-file-input {
            display: none;
        }
        .reader-upload-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 42px;
            border-radius: 8px;
            background: #007bff;
            color: #fff;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 0 0.9rem;
            line-height: 1;
            white-space: nowrap;
        }
        .reader-icon-btn,
        .reader-primary-btn,
        .reader-secondary-btn,
        .reader-danger-btn {
            border: none;
            min-height: 42px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 0.65rem 0.8rem;
        }
        .reader-icon-btn,
        .reader-secondary-btn {
            background: #e9ecef;
            color: #343a40;
        }
        .reader-primary-btn {
            background: #007bff;
            color: #fff;
        }
        .reader-danger-btn {
            background: #dc3545;
            color: #fff;
        }
        .reader-settings {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.75rem;
            padding: 1rem;
            border-bottom: 1px solid #e9ecef;
            background: #fff;
        }
        .reader-setting-group label {
            display: block;
            font-size: 0.8rem;
            color: #6c757d;
            margin-bottom: 0.35rem;
        }
        .reader-setting-group select,
        .reader-setting-group input {
            width: 100%;
            padding: 0.55rem;
            border: 1px solid #ced4da;
            border-radius: 8px;
        }
        .reader-stage {
            min-height: 520px;
            padding: 2rem;
            background: var(--reader-bg, #fffdf7);
            color: var(--reader-text, #222);
        }
        .reader-empty {
            max-width: 420px;
            margin: 5rem auto;
            text-align: center;
            color: #6c757d;
            line-height: 1.7;
        }
        .reader-book-title {
            margin: 0 0 1.5rem 0;
            color: inherit;
            font-weight: 650;
            line-height: 1.25;
        }
        .reader-content {
            font-family: var(--reader-font, Georgia, serif);
            font-size: var(--reader-size, 20px);
            line-height: var(--reader-line-height, 1.75);
        }
        .reader-content p {
            margin: 0 0 1.2em 0;
        }
        .reader-word {
            border-radius: 4px;
            cursor: pointer;
            padding: 0 1px;
        }
        .reader-word:hover {
            background: rgba(0, 123, 255, 0.12);
        }
        .reader-word.reader-known-errata {
            background: rgba(255, 193, 7, 0.38);
            box-shadow: inset 0 -2px 0 rgba(255, 193, 7, 0.9);
        }
        .reader-stage.reader-theme-light {
            --reader-bg: #fffdf7;
            --reader-text: #242424;
        }
        .reader-stage.reader-theme-eye {
            --reader-bg: #edf6ea;
            --reader-text: #223126;
        }
        .reader-stage.reader-theme-dark {
            --reader-bg: #15171a;
            --reader-text: #e9ecef;
        }
        .reader-stage.reader-theme-dark .reader-word.reader-known-errata {
            color: #fff7d6;
            background: rgba(255, 193, 7, 0.28);
        }
        .reader-popover {
            position: fixed;
            left: 50%;
            bottom: 1rem;
            transform: translateX(-50%);
            z-index: 1100;
            width: min(560px, calc(100% - 2rem));
            max-height: 70vh;
            overflow: auto;
            background: #fff;
            color: #222;
            border-radius: 12px;
            box-shadow: 0 16px 44px rgba(0,0,0,0.22);
            padding: 1rem;
            text-align: left;
        }
        .reader-popover h4 {
            margin: 0 0 0.5rem 0;
            color: #007bff;
            word-break: break-word;
        }
        .reader-popover-body {
            color: #343a40;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        .reader-popover-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }
        #create-group-btn {
            width: 100%;
            padding: 1rem;
            font-size: 1.2rem;
            background-color: #17a2b8;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 1rem;
        }
        #word-source-selector-container {
            margin-bottom: 1rem;
            background-color: #fff;
            padding: 1rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        #word-source-selector {
            width: 100%;
            padding: 0.75rem;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 1rem;
        }
        @media (max-width: 640px) {
            .home-choice-view {
                grid-template-columns: 1fr;
                min-height: auto;
            }
            .home-choice-button {
                min-height: 160px;
            }
            .reader-toolbar {
                grid-template-columns: 1fr;
            }
            .reader-actions {
                justify-content: stretch;
            }
            .reader-actions button {
                flex: 1;
            }
            .reader-settings {
                grid-template-columns: 1fr;
            }
            .reader-stage {
                padding: 1.25rem;
                min-height: 480px;
            }
        }

        /* AI Settings Styles */
        #ai-settings-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
        }
        #ai-settings-btn svg {
            width: 24px;
            height: 24px;
            fill: #6c757d;
        }
        #ai-settings-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        .modal-content h3 {
            margin-top: 0;
            color: #333;
        }
        .modal-content .form-group {
            margin-bottom: 1rem;
            text-align: left;
        }
        .modal-content label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }
        .modal-content input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
        }
        .modal-actions {
            text-align: right;
            margin-top: 1.5rem;
        }
        .modal-actions button {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            margin-left: 0.5rem;
        }
        #save-ai-settings-btn {
            background-color: #007bff;
            color: white;
        }
        #close-ai-settings-btn {
            background-color: #6c757d;
            color: white;
        }

        /* Apple-style redesign overrides */
        :root {
            color-scheme: light;
            --bg: #f5f5f7;
            --bg-elevated: rgba(255, 255, 255, 0.8);
            --surface: rgba(255, 255, 255, 0.72);
            --surface-strong: rgba(255, 255, 255, 0.92);
            --surface-soft: rgba(248, 248, 250, 0.78);
            --border: rgba(15, 23, 42, 0.08);
            --border-strong: rgba(15, 23, 42, 0.12);
            --text: #1d1d1f;
            --muted: #6e6e73;
            --accent: #0a84ff;
            --accent-soft: rgba(10, 132, 255, 0.12);
            --success: #34c759;
            --success-soft: rgba(52, 199, 89, 0.12);
            --warning: #ff9f0a;
            --warning-soft: rgba(255, 159, 10, 0.14);
            --danger: #ff453a;
            --danger-soft: rgba(255, 69, 58, 0.14);
            --shadow-sm: 0 10px 30px rgba(15, 23, 42, 0.06);
            --shadow-md: 0 18px 44px rgba(15, 23, 42, 0.09);
            --shadow-lg: 0 26px 64px rgba(15, 23, 42, 0.11);
            --radius-xl: 30px;
            --radius-lg: 24px;
            --radius-md: 18px;
            --radius-sm: 14px;
        }
        html {
            background: var(--bg);
        }
        body {
            min-height: 100vh;
            padding: 1.25rem 1rem 2.5rem;
            background: linear-gradient(180deg, #f7f7fa 0%, #f1f2f6 100%);
            color: var(--text);
        }
        main {
            max-width: 960px;
            padding-top: 0.5rem;
        }
        button,
        input,
        select,
        textarea {
            font: inherit;
        }
        button,
        input,
        select,
        textarea,
        .reader-upload-btn {
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background-color 0.18s ease, color 0.18s ease;
        }
        button:hover,
        .reader-upload-btn:hover {
            transform: translateY(-1px);
        }
        button:active,
        .reader-upload-btn:active {
            transform: translateY(0);
        }
        button:focus-visible,
        input:focus-visible,
        select:focus-visible,
        textarea:focus-visible,
        .reader-upload-btn:focus-visible {
            outline: none;
            border-color: rgba(10, 132, 255, 0.45);
            box-shadow: 0 0 0 4px rgba(10, 132, 255, 0.14);
        }
        textarea,
        input:not([type="file"]):not([type="range"]),
        select {
            width: 100%;

            display: block;
            margin-top: 0.45rem;
            color: #8b8b91;
            font-size: 0.82rem;
            line-height: 1.45;
        }
        .home-dashboard-grid {
            display: grid;
            grid-template-columns: minmax(0, 1.45fr) minmax(320px, 0.9fr);
            gap: 1rem;
        }
        .home-panel {
            padding: 1.15rem 1.15rem 1.25rem;
            border-radius: 28px;
            text-align: left;
        }
        .home-panel-header {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            align-items: flex-start;
            margin-bottom: 1rem;
        }
        .home-panel-header h3 {
            margin: 0;
            font-size: 1.2rem;
            color: var(--text);
        }
        .home-panel-caption {
            color: var(--muted);
            font-size: 0.88rem;
            white-space: nowrap;
        }
        .home-panel-side {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.55rem;
        }
        .home-calendar-controls,
        .home-trend-controls,
        .home-trend-custom {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .home-mini-icon-btn {
            width: 34px;
            height: 34px;
            min-height: 34px;
            padding: 0;
            border-radius: 50%;
            border: 1px solid rgba(15, 23, 42, 0.07);
            background: rgba(255, 255, 255, 0.88);
            color: var(--text);
            font-size: 1.25rem;
            line-height: 1;
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.06);
        }
        .home-month-input,
        #home-trend-preset,
        #home-trend-start,
        #home-trend-end {
            min-height: 34px;
            width: auto;
            border-radius: 999px;
            padding: 0 0.7rem;
            font-size: 0.84rem;
            background: rgba(255, 255, 255, 0.88);
            border: 1px solid rgba(15, 23, 42, 0.07);
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.04);
        }
        #home-trend-start,
        #home-trend-end {
            max-width: 138px;
        }
        .home-weekday-row,
        .home-calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, minmax(0, 1fr));
            gap: 0.55rem;
        }
        .home-weekday-row {
            margin-bottom: 0.55rem;
        }
        .home-weekday-row span {
            text-align: center;
            font-size: 0.8rem;
            color: #8b8b91;
        }
        .home-calendar-cell {
            min-height: 78px;
            padding: 0.55rem 0.5rem;
            border-radius: 18px;
            border: 1px solid rgba(15, 23, 42, 0.05);
            background: rgba(250, 250, 252, 0.9);
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: space-between;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9);
        }
        .home-calendar-cell.is-empty {
            background: transparent;
            border-style: dashed;
            border-color: rgba(15, 23, 42, 0.03);
            box-shadow: none;
        }
        .home-calendar-cell.level-1 {
            background: rgba(255, 237, 213, 0.82);
            border-color: rgba(255, 159, 10, 0.18);
        }
        .home-calendar-cell.level-2 {
            background: rgba(220, 242, 226, 0.88);
            border-color: rgba(52, 199, 89, 0.18);
        }
        .home-calendar-cell.level-3 {
            background: rgba(227, 239, 255, 0.92);
            border-color: rgba(10, 132, 255, 0.2);
        }
        .home-calendar-cell.is-today {
            outline: 2px solid rgba(10, 132, 255, 0.28);
            outline-offset: 1px;
        }
        .home-calendar-day {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text);
        }
        .home-calendar-meta {
            font-size: 0.78rem;
            color: var(--muted);
        }
        .home-calendar-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 0.85rem;
            margin-top: 0.9rem;
            color: var(--muted);
            font-size: 0.8rem;
        }
        .home-calendar-legend span {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
        }
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            background: rgba(15, 23, 42, 0.08);
        }
        .legend-dot.level-1 {
            background: rgba(255, 159, 10, 0.65);
        }
        .legend-dot.level-2 {
            background: rgba(52, 199, 89, 0.7);
        }
        .legend-dot.level-3 {
            background: rgba(10, 132, 255, 0.72);
        }
        .home-trend-panel {
            display: flex;
            flex-direction: column;
        }
        .home-trend-bars {
            display: grid;
            grid-template-columns: repeat(var(--trend-count, 7), minmax(38px, 1fr));
            gap: 0.65rem;
            align-items: end;
            min-height: 250px;
            padding-top: 0.3rem;
            overflow-x: auto;
            overflow-y: hidden;
            padding-bottom: 0.25rem;
        }
        .home-trend-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.45rem;
            height: 100%;
        }
        .home-trend-value {
            min-height: 1rem;
            font-size: 0.74rem;
            color: var(--muted);
        }
        .home-trend-track {
            width: 100%;
            height: 170px;
            border-radius: 18px;
            background: linear-gradient(180deg, rgba(244, 245, 248, 1), rgba(250, 250, 252, 0.76));
            border: 1px solid rgba(15, 23, 42, 0.05);
            display: flex;
            align-items: flex-end;
            padding: 0.35rem;
        }
        .home-trend-fill {
            width: 100%;
            border-radius: 14px;
            background: linear-gradient(180deg, rgba(111, 191, 255, 0.95), rgba(10, 132, 255, 1));
            box-shadow: 0 10px 20px rgba(10, 132, 255, 0.2);
        }
        .home-trend-fill.is-empty {
            background: rgba(15, 23, 42, 0.08);
            box-shadow: none;
        }
        .home-trend-day {
            color: var(--muted);
            font-size: 0.78rem;
        }
        .home-trend-summary {
            margin-top: 0.85rem;
            color: var(--muted);
            font-size: 0.92rem;
            line-height: 1.65;
        }
        .reader-shell {
            border-radius: 30px;
            overflow: hidden;
            background: rgba(247, 247, 249, 0.86);
        }
        .reader-toolbar {
            position: sticky;
            top: 0;
            z-index: 4;
            grid-template-columns: auto minmax(0, 1fr) auto;
            padding: 0.9rem 1rem;
            background: rgba(248, 248, 250, 0.84);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
        }
        .nav-back-icon {
            width: 44px;
            min-width: 44px;
            height: 44px;
            min-height: 44px;
            margin: 0;
            padding: 0;
            border-radius: 50%;
            border: 1px solid rgba(15, 23, 42, 0.07);
            background: rgba(255, 255, 255, 0.9);
            color: var(--text);
            box-shadow: 0 10px 20px rgba(15, 23, 42, 0.07);
            font-size: 1.9rem;
            line-height: 1;
        }
        #vocab-mode-switcher .nav-back-icon {
            flex: 0 0 auto;
        }
        .reader-toolbar select,
        .reader-upload-btn,
        .reader-icon-btn,
        .reader-danger-btn {
            min-height: 46px;
            border-radius: 16px;
        }
        .reader-stage {
            height: min(72vh, 760px);
            min-height: 560px;
            padding: 0;
            background: var(--reader-bg, #fffdf7);
            overflow-y: auto;
            scroll-behavior: smooth;
        }
        .reader-progress-wrap {
            padding: 0.85rem 1.15rem 0.95rem;
            background: rgba(255, 255, 255, 0.72);
            border-bottom: 1px solid rgba(15, 23, 42, 0.06);
        }
        .reader-progress-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            color: var(--muted);
            font-size: 0.86rem;
            margin-bottom: 0.55rem;
        }
        .reader-progress-track {
            height: 7px;
            border-radius: 999px;
            overflow: hidden;
            background: rgba(15, 23, 42, 0.08);
        }
        .reader-progress-fill {
            width: 0%;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, rgba(52, 199, 89, 0.95), rgba(10, 132, 255, 0.95));
            transition: width 0.2s ease;
        }
        .reader-page-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 0.75rem;
        }
        .reader-page-controls button {
            width: 42px;
            min-width: 42px;
            height: 42px;
            min-height: 42px;
            padding: 0;
            border-radius: 50%;
            font-size: 1.45rem;
        }
        .reader-page-controls button:disabled {
            opacity: 0.38;
            cursor: default;
            transform: none;
        }
        #reader-page-label {
            min-width: 112px;
            text-align: center;
            color: var(--muted);
            font-size: 0.92rem;
        }
        .reader-page {
            max-width: 980px;
            margin: 0 auto;
            padding: 1.1rem 1rem 2.4rem;
        }
        .reader-page-content {
            max-width: 760px;
            margin: 0 auto;
            min-height: 620px;
            padding: 1.8rem 1.2rem 4rem;
        }
        .reader-flow-paged .reader-page-content {
            min-height: 520px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }
        .reader-stage.reader-theme-light .reader-page-content {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.76), rgba(255, 255, 255, 0.42));
        }
        .reader-stage.reader-theme-eye .reader-page-content {
            background: linear-gradient(180deg, rgba(245, 250, 241, 0.72), rgba(240, 246, 236, 0.36));
        }
        .reader-stage.reader-theme-dark .reader-page-content {
            background: linear-gradient(180deg, rgba(22, 24, 29, 0.3), rgba(22, 24, 29, 0.08));
        }
        .reader-empty {
            max-width: 460px;
            margin: 7rem auto;
            font-size: 1rem;
        }
        .reader-book-title {
            max-width: 20ch;
            margin: 1rem auto 2rem;
            text-align: center;
            font-size: clamp(1.9rem, 4vw, 2.6rem);
            line-height: 1.18;
        }
        .reader-content {
            max-width: 34em;
            margin: 0 auto;
            font-family: var(--reader-font, "Iowan Old Style", Georgia, serif);
            font-size: var(--reader-size, 20px);
            line-height: var(--reader-line-height, 1.92);
            color: inherit;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
            font-kerning: normal;
        }
        .reader-content p {
            margin: 0 0 1.55em;
            text-wrap: pretty;
        }
        .reader-word {
            border-radius: 6px;
            padding: 0 0.04em;
        }
        .reader-settings {
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 0.75rem;
            padding: 0.95rem 1rem 1rem;
            background: rgba(252, 252, 253, 0.72);
        }
        .reader-popover {
            bottom: 1.2rem;
            width: min(600px, calc(100% - 1.5rem));
        }
        @media (max-width: 920px) {
            #home-view.home-dashboard-view,
            #reader-view {
                max-width: 100%;
            }
            .home-hero-card,
            .home-dashboard-grid {
                grid-template-columns: 1fr;
            }
            .home-stats-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
            .reader-page-content {
                padding-inline: 0.4rem;
            }
            .home-panel-header,
            .home-panel-side {
                align-items: flex-start;
            }
            .home-panel-header {
                flex-direction: column;
            }
        }
        @media (max-width: 640px) {
            .home-hero-card {
                padding: 1rem;
            }
            .home-hero-copy {
                min-height: auto;
                padding: 0;
            }
            .home-quick-action {
                min-height: 92px;
            }
            .home-stats-grid {
                grid-template-columns: 1fr;
            }
            .home-calendar-cell {
                min-height: 64px;
                padding: 0.45rem;
                border-radius: 16px;
            }
            .home-weekday-row,
            .home-calendar-grid {
                gap: 0.4rem;
            }
            .home-trend-bars {
                min-height: 220px;
                gap: 0.45rem;
            }
            .home-trend-controls,
            .home-trend-custom {
                flex-wrap: wrap;
            }
            #home-trend-start,
            #home-trend-end {
                max-width: none;
                flex: 1;
            }
            .home-trend-track {
                height: 140px;
            }
            .reader-toolbar {
                position: static;
                grid-template-columns: auto minmax(0, 1fr);
            }
            .reader-actions {
                grid-column: 1 / -1;
            }
            .reader-page {
                padding: 0.85rem 0.7rem 1.8rem;
            }
            .reader-page-content {
                padding: 0.8rem 0 2.2rem;
                min-height: 480px;
            }
            .reader-book-title {
                margin-bottom: 1.35rem;
            }
            .reader-content {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

    <main>
        <button id="ai-settings-btn" title="AI 设置" class="hidden">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17-.59-1.69-.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/></svg>
        </button>

        <h1 id="app-title">康康背词器</h1>

        <!-- Local status section kept for compatibility with existing script hooks. -->
        <div id="auth-container" class="hidden">
            <div id="login-view">
                <h3>本机记忆模式</h3>
                <p>学习进度会保存在当前设备上。添加到 iPhone 主屏幕后，可作为 PWA 使用。</p>
                <input type="email" id="login-email" placeholder="邮箱" class="hidden">
                <input type="password" id="login-password" placeholder="密码" class="hidden">
                <p id="auth-error-login" class="auth-error-message"></p>
                <button id="login-btn" class="hidden">开始使用</button>
                <p><a href="#" id="show-register-link" class="hidden">切换注册</a></p>
            </div>

            <div id="register-view" class="hidden">
                <h3>本机记忆模式</h3>
                <input type="email" id="register-email" placeholder="邮箱" class="hidden">
                <input type="password" id="register-password" placeholder="密码" class="hidden">
                <p id="auth-error-register" class="auth-error-message"></p>
                <button id="register-btn" class="hidden">注册</button>
                <p><a href="#" id="show-login-link" class="hidden">返回</a></p>
            </div>

            <div id="user-status" class="hidden">
                <p id="user-info"></p>
                <button id="logout-btn">重新载入</button>
            </div>
        </div>


        <!-- Main App Content -->
        <div id="app-content" class="hidden">
            <div id="home-view" class="home-choice-view">
                <button id="home-vocab-btn" class="home-choice-button primary">背词</button>
                <button id="home-reader-btn" class="home-choice-button secondary">阅读</button>
            </div>
            <button id="vocab-back-home" class="section-back-btn hidden">← 返回首页</button>
            <div id="add-word-container" class="hidden">
                <input type="text" id="add-word-input" placeholder="向主词库添加新单词...">
                <button id="add-word-btn">添加并学习</button>
            </div>
            <div id="vocab-mode-switcher" class="mode-switcher hidden">
                <button id="mode-learn" class="mode-button active">学习</button>
                <button id="mode-challenge" class="mode-button">造句大挑战</button>
                <button id="mode-translation-challenge" class="mode-button">翻译大挑战 ✍️</button>
                <button id="mode-errata" class="mode-button">错题本管理</button>
            </div>

            <!-- Learn View (Static Structure) -->
            <div id="learn-view">
                <div id="word-source-selector-container">
                    <label for="word-source-selector">当前词库: </label>
                    <select id="word-source-selector"></select>
                </div>
                <div class="word-card">
                    <div class="word-header">
                        <h2 id="main-word">正在初始化...</h2>
                        <button id="speak-btn" class="speak-btn hidden" title="朗读单词">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                        </button>
                    </div>
                    <div id="word-details" class="hidden">
                        <p id="pronunciation"></p>
                        <p id="definition"></p>
                    </div>
                    <div id="sentence-maker" class="hidden">
                        <p><strong>请尝试用这个单词造一个句子：</strong></p>
                        <textarea id="sentence-input" placeholder="在此输入你的句子..."></textarea>
                    </div>
                    <div id="loading-spinner" class="hidden"></div>
                    <div id="ai-feedback" class="hidden"></div>
                    <!-- Finished State Content will be injected here -->
                    <div id="finished-state" class="hidden" style="font-size: 1.5rem; color: #007bff;"></div>
                </div>
                <div id="actions-initial" class="actions"> <button id="btn-unknown" class="action-button">不认识</button> <button id="btn-known" class="action-button">认识</button> </div>
                <div id="actions-confirm" class="actions hidden"> <button id="btn-correction" class="action-button">修正:不认识</button> <button id="btn-confirm-known" class="action-button">下一个</button> </div>
                <div id="actions-sentence" class="actions hidden"> <button id="btn-submit-sentence" class="action-button" style="width: 95%;">提交造句</button> </div>
                <div id="actions-finish" class="actions hidden"> <button id="btn-finish-learning" class="action-button" style="width: 95%;">完成复习</button> </div>
                <div id="actions-restart" class="actions hidden"> <button id="btn-restart-wordlist" class="action-button" style="width: 80%;">重新学习</button> </div>
                <!-- NEW: Action button for continuing review -->
                <div id="actions-continue-review" class="actions hidden"> <button id="btn-continue-review" class="action-button" style="width: 80%;">继续学习待复习单词</button> </div>
            </div>

            <!-- Other Views (Challenge, Translation, Lists) -->
            <div id="challenge-view" class="hidden">
                 <div class="word-card">
                    <div id="challenge-setup">
                        <h3>造句大挑战</h3>
                        <p>选择单词数量，用所有出现的单词造一个句子或段落。</p>
                        <div>
                            <label for="word-count-selector">单词数量: </label>
                            <select id="word-count-selector">
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3" selected>3</option>
                                <option value="4">4</option>
                                <option value="5">5</option>
                            </select>
                        </div>
                        <div class="actions">
                            <button id="btn-start-challenge" class="action-button" style="width: 95%;">开始挑战</button>
                        </div>
                    </div>
                    <div id="challenge-area" class="hidden">
                        <div id="challenge-words-display"></div>
                        <div id="challenge-sentence-maker">
                            <textarea id="challenge-sentence-input" placeholder="用上面的所有单词造句..."></textarea>
                        </div>
                        <div id="challenge-loading-spinner" class="hidden"></div>
                        <div id="challenge-ai-feedback" class="hidden"></div>
                    </div>
                </div>
                <div id="actions-challenge" class="actions hidden">
                    <button id="btn-submit-challenge" class="action-button" style="width: 45%;">提交批改</button>
                    <button id="btn-next-challenge" class="action-button" style="width: 45%;">下一个挑战</button>
                </div>
            </div>
            <div id="translation-challenge-view" class="hidden">
                <div class="word-card">
                    <div id="translation-challenge-setup">
                        <h3>翻译大挑战 ✍️</h3>
                        <p>输入一个中文主题，AI将为您生成一个相关的句子，请将它翻译成英文。</p>
                        <input type="text" id="translation-topic-input" placeholder="例如：散步在雨后" style="width: 100%; padding: 0.5rem; font-size: 1rem; margin-bottom: 1rem;">
                        <div class="actions">
                            <button id="btn-start-translation-challenge" class="action-button" style="width: 95%;">开始挑战</button>
                        </div>
                    </div>
                    <div id="translation-challenge-area" class="hidden">
                        <p id="translation-chinese-sentence"></p>
                        <div id="translation-challenge-maker">
                            <textarea id="translation-challenge-input" placeholder="在这里输入您的英文翻译..."></textarea>
                        </div>
                        <div id="translation-loading-spinner" class="hidden"></div>
                        <div id="translation-ai-feedback" class="hidden"></div>
                    </div>
                </div>
                <div id="actions-translation-challenge" class="actions hidden">

        let lastStudyInteractionAt = Date.now();
        let lastTrackedMinuteKey = '';
        let readerSettings = {
            font: 'Georgia, serif',
            fontSize: 20,
            lineHeight: 1.75,
            theme: 'eye',
            flow: 'scroll',
            lastBookId: ''
        };

            url: SILICONFLOW_API_URL,
            model: SILICONFLOW_DEFAULT_MODEL,

        };

        // Reset state to default values
        function resetState() {
            allWords = [];
            learningQueue = [];
            currentWord = null;
            challengeWords = [];
            currentChineseSentence = '';
            knownWords = [];
            reviewWords = [];
            errata = {};
            studyStats = createEmptyStudyStats();
            userId = null;
        }

        // Load state from local storage
        async function loadState() {
            try {
                const data = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY_APP_STATE) || '{}');
                allWords = data.allWords || [];
                knownWords = data.knownWords || [];
                reviewWords = data.reviewWords || [];
                errata = data.errata || {};
                studyStats = normalizeStudyStats(data.studyStats);
            } catch (error) {
                console.error("Error loading local data: ", error);
                allWords = [];
                knownWords = [];
                reviewWords = [];
                errata = {};
                studyStats = createEmptyStudyStats();
            }

            try {
                const savedAiConfig = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY_AI_CONFIG) || '{}');
                aiConfig = { ...aiConfig, ...savedAiConfig };
            } catch (error) {
                console.error("Error loading AI settings: ", error);
            }
        }

        // Save state to local storage
        async function saveState() {
            try {
                localStorage.setItem(LOCAL_STORAGE_KEY_APP_STATE, JSON.stringify({
                    allWords,
                    knownWords,
                    reviewWords,
                    errata,
                    studyStats,
                    updatedAt: new Date().toISOString()
                }));
                if (!homeView.classList.contains('hidden')) renderHomeDashboard();
            } catch (error) {
                console.error("Error saving local data: ", error);
                alert('本机存储失败，可能是浏览器空间不足。');
            }
        }

        function saveAiConfig() {
            localStorage.setItem(LOCAL_STORAGE_KEY_AI_CONFIG, JSON.stringify(aiConfig));
        }

        function createEmptyStudyStats() {
            return {
                daily: {},
                updatedAt: null
            };
        }

        function normalizeStudyStats(raw) {
            const base = createEmptyStudyStats();
            if (!raw || typeof raw !== 'object') return base;
            const normalizedDaily = {};
            Object.entries(raw.daily || {}).forEach(([dateKey, value]) => {
                if (!/^\d{4}-\d{2}-\d{2}$/.test(dateKey)) return;
                normalizedDaily[dateKey] = {
                    minutes: Math.max(0, Number(value?.minutes) || 0),
                    interactions: Math.max(0, Number(value?.interactions) || 0),
                    wordsKnown: Math.max(0, Number(value?.wordsKnown) || 0),
                    wordsReviewed: Math.max(0, Number(value?.wordsReviewed) || 0),
                    readerMinutes: Math.max(0, Number(value?.readerMinutes) || 0),
                    vocabMinutes: Math.max(0, Number(value?.vocabMinutes) || 0)
                };
            });
            return {
                daily: normalizedDaily,
                updatedAt: raw.updatedAt || null
            };
        }

        function getDateKey(date = new Date()) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function ensureStudyDay(dateKey = getDateKey()) {
            if (!studyStats.daily[dateKey]) {
                studyStats.daily[dateKey] = {
                    minutes: 0,
                    interactions: 0,
                    wordsKnown: 0,
                    wordsReviewed: 0,
                    readerMinutes: 0,
                    vocabMinutes: 0
                };
            }
            return studyStats.daily[dateKey];
        }

        function markStudyInteraction() {
            lastStudyInteractionAt = Date.now();
        }

        function recordStudyEvent({ minutes = 0, interactions = 0, wordsKnown = 0, wordsReviewed = 0, section = currentAppSection } = {}) {
            if (section === 'home' && minutes <= 0 && wordsKnown <= 0 && wordsReviewed <= 0) {
                markStudyInteraction();
                return;
            }
            const day = ensureStudyDay();
            day.minutes += minutes;
            day.interactions += interactions;
            day.wordsKnown += wordsKnown;
            day.wordsReviewed += wordsReviewed;
            if (minutes > 0) {
                if (section === 'reader') day.readerMinutes += minutes;
                else day.vocabMinutes += minutes;
            }
            studyStats.updatedAt = new Date().toISOString();
            markStudyInteraction();
            saveState();
        }

        function startStudyTracker() {
            if (studyTimerId) return;
            studyTimerId = window.setInterval(() => {
                if (document.hidden || currentAppSection === 'home') return;
                if (Date.now() - lastStudyInteractionAt > 120000) return;
                const now = new Date();
                const minuteKey = `${getDateKey(now)}-${now.getHours()}-${now.getMinutes()}`;
                if (minuteKey === lastTrackedMinuteKey) return;
                lastTrackedMinuteKey = minuteKey;
                recordStudyEvent({ minutes: 1, section: currentAppSection });
            }, 15000);
        }

        function hasStudyActivity(day) {
            if (!day) return false;
            return (day.minutes || 0) > 0 || (day.interactions || 0) > 0 || (day.wordsKnown || 0) > 0 || (day.wordsReviewed || 0) > 0;
        }

        function getActivityLevel(day) {
            if (!hasStudyActivity(day)) return 0;
            const minutes = day.minutes || 0;
            if (minutes >= 25 || day.wordsReviewed >= 10 || day.wordsKnown >= 6) return 3;
            if (minutes >= 10 || day.wordsReviewed >= 5 || day.wordsKnown >= 3) return 2;
            return 1;
        }

        function getRecentDayKeys(count, endDate = new Date()) {
            const days = [];
            for (let offset = count - 1; offset >= 0; offset--) {
                const date = new Date(endDate);
                date.setHours(12, 0, 0, 0);
                date.setDate(date.getDate() - offset);
                days.push(getDateKey(date));
            }
            return days;
        }

        function getDateRangeKeys(startDate, endDate) {
            let start = new Date(startDate);
            let end = new Date(endDate);
            start.setHours(12, 0, 0, 0);
            end.setHours(12, 0, 0, 0);
            if (start > end) [start, end] = [end, start];

            const keys = [];
            const cursor = new Date(start);
            while (cursor <= end) {
                keys.push(getDateKey(cursor));
                cursor.setDate(cursor.getDate() + 1);
            }
            return keys;
        }

        function getStudyStreak() {
            let streak = 0;
            const probe = new Date();
            probe.setHours(12, 0, 0, 0);
            while (true) {
                const key = getDateKey(probe);
                if (!hasStudyActivity(studyStats.daily[key])) break;
                streak += 1;
                probe.setDate(probe.getDate() - 1);
            }
            return streak;
        }

        function getReviewDueCount() {
            const now = Date.now();
            return allWords.filter(word => word.status === 'learning' && word.nextReviewDate && new Date(word.nextReviewDate).getTime() <= now).length;
        }

        function formatMonthLabel(date = new Date()) {
            return `${date.getFullYear()} 年 ${date.getMonth() + 1} 月`;
        }

        function getMonthActivityDays(date = new Date()) {
            const year = date.getFullYear();
            const month = date.getMonth();
            return Object.entries(studyStats.daily).filter(([key, value]) => {
                const parsed = new Date(`${key}T12:00:00`);
                return parsed.getFullYear() === year && parsed.getMonth() === month && hasStudyActivity(value);
            }).length;
        }

        function renderHomeCalendar(date = homeCalendarCursor) {
            if (!homeCalendarGrid) return;
            homeCalendarGrid.innerHTML = '';
            const year = date.getFullYear();
            const month = date.getMonth();
            const firstDay = new Date(year, month, 1);
            const startOffset = (firstDay.getDay() + 6) % 7;
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < startOffset; i++) {
                const blank = document.createElement('div');
                blank.className = 'home-calendar-cell is-empty';
                homeCalendarGrid.appendChild(blank);
            }

            const todayKey = getDateKey();
            for (let dayNumber = 1; dayNumber <= daysInMonth; dayNumber++) {
                const cellDate = new Date(year, month, dayNumber, 12, 0, 0, 0);
                const dateKey = getDateKey(cellDate);
                const activity = studyStats.daily[dateKey];
                const level = getActivityLevel(activity);

                const cell = document.createElement('div');
                cell.className = `home-calendar-cell level-${level}${dateKey === todayKey ? ' is-today' : ''}`;
                cell.title = `${dateKey} · 学习 ${activity?.minutes || 0} 分钟`;

                const dayEl = document.createElement('span');
                dayEl.className = 'home-calendar-day';
                dayEl.textContent = dayNumber;

                const metaEl = document.createElement('span');
                metaEl.className = 'home-calendar-meta';
                metaEl.textContent = activity?.minutes ? `${activity.minutes}m` : '';

                cell.appendChild(dayEl);
                cell.appendChild(metaEl);
                homeCalendarGrid.appendChild(cell);
            }

            if (homeCalendarMonth) {
                homeCalendarMonth.value = `${year}-${String(month + 1).padStart(2, '0')}`;
            }
        }

        function renderHomeTrend() {
            if (!homeTrendBars) return;
            if (homeTrendPreset) homeTrendPreset.value = homeTrendRange.preset;
            if (homeTrendCustom) homeTrendCustom.classList.toggle('hidden', homeTrendRange.preset !== 'custom');
            if (homeTrendStart && homeTrendRange.start) homeTrendStart.value = homeTrendRange.start;
            if (homeTrendEnd && homeTrendRange.end) homeTrendEnd.value = homeTrendRange.end;
            const recentKeys = getTrendDateKeys();
            const recentDays = recentKeys.map(key => ({ key, value: studyStats.daily[key] || ensureTrendDayFallback() }));
            const maxMinutes = Math.max(10, ...recentDays.map(item => item.value.minutes || 0));
            const totalMinutes = recentDays.reduce((sum, item) => sum + (item.value.minutes || 0), 0);
            homeTrendBars.innerHTML = '';
            homeTrendBars.style.setProperty('--trend-count', recentDays.length || 1);

            recentDays.forEach(({ key, value }) => {
                const barItem = document.createElement('div');
                barItem.className = 'home-trend-item';

                const valueLabel = document.createElement('span');
                valueLabel.className = 'home-trend-value';
                valueLabel.textContent = value.minutes ? `${value.minutes}m` : '';

                const track = document.createElement('div');
                track.className = 'home-trend-track';

                const fill = document.createElement('div');
                fill.className = 'home-trend-fill';
                fill.style.height = `${Math.max(8, ((value.minutes || 0) / maxMinutes) * 100)}%`;
                if (!value.minutes) {
                    fill.style.height = '10px';
                    fill.classList.add('is-empty');
                }
                track.appendChild(fill);

                const dayLabel = document.createElement('span');
                dayLabel.className = 'home-trend-day';
                const dayDate = new Date(`${key}T12:00:00`);
                dayLabel.textContent = `${dayDate.getMonth() + 1}/${dayDate.getDate()}`;

                barItem.appendChild(valueLabel);
                barItem.appendChild(track);
                barItem.appendChild(dayLabel);
                homeTrendBars.appendChild(barItem);
            });

            if (homeTrendCaption) homeTrendCaption.textContent = `${totalMinutes} 分钟`;
            if (homeTrendTitle) homeTrendTitle.textContent = getTrendTitle(recentKeys);
            if (homeTrendSummary) {
                const today = studyStats.daily[getDateKey()] || ensureTrendDayFallback();
                const activeDays = recentDays.filter(item => hasStudyActivity(item.value)).length;
                homeTrendSummary.textContent = `${getTrendTitle(recentKeys)}共学习 ${totalMinutes} 分钟，其中 ${activeDays} 天有记录。今天背词 ${today.vocabMinutes || 0} 分钟，阅读 ${today.readerMinutes || 0} 分钟。`;
            }
        }

        function getTrendDateKeys() {
            if (homeTrendRange.preset === 'custom') {
                const end = homeTrendRange.end ? new Date(`${homeTrendRange.end}T12:00:00`) : new Date();
                const start = homeTrendRange.start
                    ? new Date(`${homeTrendRange.start}T12:00:00`)
                    : new Date(end.getFullYear(), end.getMonth(), end.getDate() - 6, 12, 0, 0, 0);
                return getDateRangeKeys(start, end);
            }
            return getRecentDayKeys(Number(homeTrendRange.preset) || 7);
        }

        function getTrendTitle(keys) {
            if (!keys.length) return '趋势图';
            if (homeTrendRange.preset !== 'custom') return `最近 ${Number(homeTrendRange.preset) || 7} 天`;
            const first = keys[0].slice(5).replace('-', '/');
            const last = keys[keys.length - 1].slice(5).replace('-', '/');
            return `${first} - ${last}`;
        }

        function ensureTrendDayFallback() {
            return { minutes: 0, interactions: 0, wordsKnown: 0, wordsReviewed: 0, readerMinutes: 0, vocabMinutes: 0 };
        }

        function renderHomeDashboard() {
            if (!homeView || !homeHeadline) return;
            const todayKey = getDateKey();
            const today = studyStats.daily[todayKey] || ensureTrendDayFallback();
            const streak = getStudyStreak();
            const reviewDueCount = getReviewDueCount();
            const monthActivityDays = getMonthActivityDays(homeCalendarCursor);
            const weekMinutes = getRecentDayKeys(7).reduce((sum, key) => sum + ((studyStats.daily[key]?.minutes) || 0), 0);

            homeHeadline.textContent = streak > 0 ? `已经连续学习 ${streak} 天` : '今天把节奏接上';
            homeSummary.textContent = weekMinutes > 0
                ? `最近 7 天累计学习 ${weekMinutes} 分钟，背词与阅读都会自动记入这里。`
                : '开始一次背词或阅读后，这里会自动出现你的学习轨迹。';

            homeStatTodayMinutes.textContent = `${today.minutes || 0} 分钟`;
            homeStatTodayFootnote.textContent = today.minutes ? `背词 ${today.vocabMinutes || 0} 分钟 · 阅读 ${today.readerMinutes || 0} 分钟` : '还没开始';
            homeStatStreak.textContent = `${streak} 天`;
            homeStatReview.textContent = `${reviewDueCount} 个`;
            homeStatKnown.textContent = `${knownWords.length} 个`;

            if (homeCalendarTitle) homeCalendarTitle.textContent = formatMonthLabel(homeCalendarCursor);
            if (homeCalendarCaption) homeCalendarCaption.textContent = `${monthActivityDays} 天有记录`;

            renderHomeCalendar();
            renderHomeTrend();
        }

        // --- 6. Core Learning & SRS Logic ---

        function showNextWord() {
            buildLearningQueue(false); // Build a normal queue first
            if (learningQueue.length > 0) {
                currentWord = learningQueue.shift();
                updateUiForState('learning');
                markStudyInteraction();
                prefetchWordDefinition(currentWord.word);
            } else {
                const sourceWords = getCurrentSourceWords();
                const allKnown = sourceWords.every(word => word.status === 'known');

                if (allKnown && sourceWords.length > 0) {
                    updateUiForState('finished');
                } else {
                    updateUiForState('session_complete');
                }
            }
        }

        function getCurrentSourceWords() {
            if (!allWords) return [];
            const source = wordSourceSelector.value;
            const allErrataWordsSet = new Set(Object.values(errata).flat());
            let sourceWordStrings;

            if (source === 'default') {
                sourceWordStrings = allWords.filter(w => !allErrataWordsSet.has(w.word)).map(w => w.word);
            } else if (source === 'errata_all') {
                sourceWordStrings = Array.from(allErrataWordsSet);
            } else if (source.startsWith('errata_')) {
                const groupName = source.replace('errata_', '');
                sourceWordStrings = errata[groupName] || [];
            } else {
                sourceWordStrings = allWords.map(w => w.word);
            }
            return allWords.filter(w => sourceWordStrings.includes(w.word));
        }

        function buildLearningQueue(forceAll = false) {
            const sourceWords = getCurrentSourceWords();
            if (!sourceWords) {
                learningQueue = [];
                return;
            }

            if (forceAll) {
                const wordsToForce = sourceWords.filter(word => word.status !== 'known');
                shuffleArray(wordsToForce);
                learningQueue = wordsToForce;
                return;
            }

            const now = new Date().getTime();
            const wordsToReview = sourceWords.filter(word =>
                word.status === 'learning' &&
                word.nextReviewDate &&
                new Date(word.nextReviewDate).getTime() <= now
            );

            const newWords = sourceWords.filter(word => word.status === 'new');

            shuffleArray(wordsToReview);
            shuffleArray(newWords);

            learningQueue = [...wordsToReview, ...newWords.slice(0, NEW_WORDS_PER_SESSION)];
        }

        function handleContinueReview() {
            buildLearningQueue(true);
            if (learningQueue.length > 0) {
                currentWord = learningQueue.shift();
                updateUiForState('learning');
                prefetchWordDefinition(currentWord.word);
            } else {
                updateUiForState('finished');
            }
        }

        async function handleRestartWordList() {
            if (!confirm('确定要重置该词库吗？所有相关的学习进度都将被清除。')) {
                return;
            }

            const wordsToReset = getCurrentSourceWords().map(w => w.word);

            if (wordsToReset.length === 0) {
                alert('没有需要重置的单词。');
                return;
            }

            allWords.forEach(wordObj => {
                if (wordsToReset.includes(wordObj.word)) {
                    wordObj.status = 'new';
                    wordObj.srsLevel = 0;
                    wordObj.nextReviewDate = null;
                }
            });

            knownWords = knownWords.filter(word => !wordsToReset.includes(word));
            reviewWords = reviewWords.filter(word => !wordsToReset.includes(word));

            saveState(); // Non-blocking
            alert('词库已成功重置！');
            showNextWord();
        }

        function handleKnown() {
            const wordIndex = allWords.findIndex(w => w.word === currentWord.word);
            if (wordIndex > -1) {
                allWords[wordIndex].status = 'known';
                allWords[wordIndex].srsLevel = -1; // Mark as known
                allWords[wordIndex].nextReviewDate = null;
                addToList('known', currentWord.word);
            }
            recordStudyEvent({ interactions: 1, wordsKnown: 1, wordsReviewed: 1, section: 'learn' });
            loadWordDetails();
            updateUiForState('show_answer');
        }

        function handleUnknown() {
            const wordIndex = allWords.findIndex(w => w.word === currentWord.word);
            if (wordIndex > -1) {
                allWords[wordIndex].status = 'learning';
                allWords[wordIndex].srsLevel = 0; // Reset progress

        async function callSiliconFlowJson(messages, options = {}) {
            if (!aiConfig.apiKey) {
                throw new Error('请先在右上角 AI 设置里填写硅基流动 API Key。');
            }

            const body = {
                model: aiConfig.model || SILICONFLOW_DEFAULT_MODEL,
                messages,
                temperature: options.temperature ?? 0.3
            };
            if (options.maxTokens) {
                body.max_tokens = options.maxTokens;
            }

            const response = await fetch(aiConfig.url || SILICONFLOW_API_URL, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${aiConfig.apiKey}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(body)
            });

            const responseText = await response.text();
            let payload;
            try {
                payload = JSON.parse(responseText);
            } catch (error) {
                throw new Error(`AI 返回了无法解析的响应: ${responseText.slice(0, 120)}`);
            }

            if (!response.ok) {
                throw new Error(payload?.error?.message || payload?.message || `AI 服务返回错误 ${response.status}`);
            }

            const content = payload?.choices?.[0]?.message?.content;
            if (!content) {
                throw new Error('AI 没有返回有效内容。');
            }

            return parseJsonFromAiText(content);
        }

        function parseJsonFromAiText(text) {
            const trimmed = String(text).trim();
            try {
                return JSON.parse(trimmed);
            } catch (error) {
                const match = trimmed.match(/\{[\s\S]*\}/);
                if (match) {
                    return JSON.parse(match[0]);
                }
                throw new Error('AI 返回的内容不是 JSON。');
            }
        }

        function escapeHtml(value) {
            return String(value)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function loadDefinitionCache() {

        function getCachedDefinition(word) {

        function setCachedDefinition(word, data) {
            const cache = loadDefinitionCache();
            cache[word] = { ...data, cachedAt: Date.now() };
            const entries = Object.entries(cache)
                .sort((a, b) => (b[1].cachedAt || 0) - (a[1].cachedAt || 0))
                .slice(0, DEFINITION_CACHE_LIMIT);
            localStorage.setItem(LOCAL_STORAGE_KEY_DEFINITION_CACHE, JSON.stringify(Object.fromEntries(entries)));
